<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Invitation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="invitation">
        <h1>🎉 You're Invited! 🎉</h1>
        <p class="subtitle">Join us for a special event</p>

        <div class="details">
            <p><strong>📅 Date:</strong> 25 March 2026</p>
            <p><strong>⏰ Time:</strong> 5:00 PM onwards</p>
            <p><strong>📍 Venue:</strong> City Convention Hall</p>
        </div>

        <p class="description">
            We are excited to invite you to celebrate this special occasion with us.
            Your presence will make the event even more memorable!
        </p>

        <h2>📩 RSVP</h2>
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>

            <select required>
                <option value="">Will you attend?</option>
                <option>Yes, I will attend</option>
                <option>Sorry, can't attend</option>
            </select>

            <button type="submit">Submit</button>
        </form>

        <p class="footer">✨ We look forward to seeing you ✨</p>
    </div>

</body>
</html>
